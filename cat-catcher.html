<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pegador de Petiscos 🐱</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Nunito',sans-serif;min-height:100vh;background:#1a0a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;}
        .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
        .star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--dur) ease-in-out infinite;}
        @keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.8;}}
        .back-btn{position:fixed;top:1.2rem;left:1.2rem;z-index:100;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);color:white;font-family:'Nunito',sans-serif;font-weight:700;padding:0.6rem 1.2rem;border-radius:50px;cursor:pointer;transition:all 0.3s;font-size:0.95rem;}
        .back-btn:hover{background:rgba(255,255,255,0.2);transform:translateX(-3px);}
        .wrapper{position:relative;z-index:2;width:100%;max-width:500px;display:flex;flex-direction:column;align-items:center;gap:1rem;}
        h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#ff9de2,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;}
        .hud{display:flex;gap:2rem;justify-content:center;font-size:1.1rem;color:rgba(255,255,255,0.85);font-weight:700;}
        .hud span{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:0.4rem 1rem;border-radius:50px;}
        .hud .label{color:rgba(255,255,255,0.5);font-weight:600;font-size:0.85rem;}
        #lives{color:#ff6b9d;}
        .game-area{width:100%;height:350px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,107,157,0.4);border-radius:20px;position:relative;overflow:hidden;cursor:none;}
        .game-area::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center bottom, rgba(255,107,157,0.08) 0%, transparent 70%);}
        .catcher{width:72px;height:72px;position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:3.2rem;user-select:none;z-index:2;transition:left 0.05s linear;filter:drop-shadow(0 0 10px rgba(255,107,157,0.6));}
        .falling-item{position:absolute;font-size:2rem;z-index:1;pointer-events:none;}
        .score-pop{position:absolute;font-size:1.5rem;font-weight:800;pointer-events:none;animation:popUp 0.8s ease-out forwards;z-index:3;color:#86efac;text-shadow:0 0 10px rgba(134,239,172,0.8);}
        .score-pop.bad{color:#ff6b6b;text-shadow:0 0 10px rgba(255,107,107,0.8);}
        @keyframes popUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-60px);}}
        .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;background:rgba(26,10,46,0.85);backdrop-filter:blur(8px);border-radius:18px;z-index:10;}
        .overlay h2{font-size:2rem;font-weight:800;color:white;}
        .overlay .final-score{font-size:1.2rem;color:rgba(255,255,255,0.7);}
        .overlay .final-score strong{color:#ff9de2;font-size:1.8rem;}
        .btn{padding:0.8rem 2rem;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all 0.3s;letter-spacing:0.5px;}
        .btn-start{background:linear-gradient(135deg,#ff6b9d,#c44dff);color:white;box-shadow:0 6px 20px rgba(196,77,255,0.4);}
        .btn-start:hover{transform:translateY(-2px) scale(1.05);}
        .instructions{color:rgba(255,255,255,0.45);font-size:0.85rem;text-align:center;}
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <button class="back-btn" onclick="window.location.href='pagina2.html'">← Voltar</button>
    <div class="wrapper">
        <h1>🐱 Pegador de Petiscos</h1>
        <div class="hud">
            <span><span class="label">Pontos </span><span id="scoreVal">0</span></span>
            <span><span class="label">Vidas </span><span id="lives">❤️❤️❤️</span></span>
            <span><span class="label">Nível </span><span id="levelVal">1</span></span>
        </div>
        <div class="game-area" id="gameArea">
            <div class="catcher" id="catcher">😺</div>
            <div class="overlay" id="overlay">
                <div style="font-size:4rem">🐟</div>
                <h2>Pegador de Petiscos</h2>
                <p class="final-score">Apanha os petiscos, evita as bombas!</p>
                <button class="btn btn-start" onclick="startGame()">▶ Iniciar Jogo</button>
                <p class="instructions">Move o rato (ou toque) para controlar o gato</p>
            </div>
        </div>
    </div>
    <script>
        const starsEl=document.getElementById('stars');
        for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+1;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s`;starsEl.appendChild(s);}

        const gameArea=document.getElementById('gameArea');
        const catcher=document.getElementById('catcher');
        const overlay=document.getElementById('overlay');
        let score=0,lives=3,level=1,active=false,spawnTimer,items=[];
        let catcherX=gameArea.offsetWidth/2-36;
        let targetX=catcherX;

        const livesStr=()=>['','❤️','❤️❤️','❤️❤️❤️'][lives]||'';
        const GOODS=['🐟','🍗','🍣','🥩','🐠'];
        const BADS=['💣','💀'];

        function startGame(){
            score=0;lives=3;level=1;active=true;items=[];
            document.getElementById('scoreVal').textContent=0;
            document.getElementById('lives').textContent=livesStr();
            document.getElementById('levelVal').textContent=1;
            overlay.style.display='none';
            gameArea.querySelectorAll('.falling-item,.score-pop').forEach(e=>e.remove());
            spawnItem();
            requestAnimationFrame(gameLoop);
        }

        function spawnItem(){
            if(!active)return;
            const isBad=Math.random()<(0.2+level*0.03);
            const emoji=isBad?BADS[Math.floor(Math.random()*BADS.length)]:GOODS[Math.floor(Math.random()*GOODS.length)];
            const el=document.createElement('div');
            el.className='falling-item';
            el.textContent=emoji;
            el.dataset.bad=isBad?'1':'0';
            const areaW=gameArea.offsetWidth;
            el.style.left=Math.random()*(areaW-40)+'px';
            el.style.top='-40px';
            const speed=80+level*15+Math.random()*40;
            el.dataset.speed=speed;
            el.dataset.y=-40;
            gameArea.appendChild(el);
            items.push(el);
            const nextSpawn=Math.max(400,1200-level*80);
            spawnTimer=setTimeout(spawnItem,nextSpawn);
        }

        let lastTime=null;
        function gameLoop(ts){
            if(!active)return;
            const dt=lastTime?Math.min((ts-lastTime)/1000,0.05):0.016;
            lastTime=ts;
            // Smooth catcher movement
            catcherX+=(targetX-catcherX)*0.18;
            catcher.style.left=catcherX+'px';
            const areaH=gameArea.offsetHeight;
            const catcherRect={left:catcherX,right:catcherX+72,top:areaH-84,bottom:areaH-12};
            // Move items
            for(let i=items.length-1;i>=0;i--){
                const item=items[i];
                const y=parseFloat(item.dataset.y)+parseFloat(item.dataset.speed)*dt;
                item.dataset.y=y;
                item.style.top=y+'px';
                const ix=parseFloat(item.style.left);
                // Collision
                if(ix<catcherRect.right && ix+36>catcherRect.left && y+36>catcherRect.top && y<catcherRect.bottom){
                    if(item.dataset.bad==='1'){
                        lives--;
                        document.getElementById('lives').textContent=livesStr();
                        showPop(ix,catcherRect.top,'-1 💥',true);
                        if(lives<=0){endGame();return;}
                    } else {
                        score++;
                        document.getElementById('scoreVal').textContent=score;
                        const newLevel=Math.floor(score/8)+1;
                        if(newLevel>level){level=newLevel;document.getElementById('levelVal').textContent=level;}
                        showPop(ix,catcherRect.top,'+1 ✨',false);
                    }
                    item.remove();items.splice(i,1);
                } else if(y>areaH){
                    item.remove();items.splice(i,1);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function showPop(x,y,text,bad){
            const p=document.createElement('div');
            p.className='score-pop'+(bad?' bad':'');
            p.textContent=text;
            p.style.left=Math.max(0,Math.min(x,gameArea.offsetWidth-60))+'px';
            p.style.top=(y-20)+'px';
            gameArea.appendChild(p);
            setTimeout(()=>p.remove(),800);
        }

        function endGame(){
            active=false;clearTimeout(spawnTimer);lastTime=null;
            items.forEach(e=>e.remove());items=[];
            overlay.innerHTML=`<div style="font-size:3rem">💀</div><h2>Game Over!</h2><p class="final-score">Pontuação: <strong>${score}</strong></p><button class="btn btn-start" onclick="startGame()">▶ Jogar Novamente</button>`;
            overlay.style.display='flex';
        }

        gameArea.addEventListener('mousemove',e=>{
            const rect=gameArea.getBoundingClientRect();
            targetX=Math.max(0,Math.min(e.clientX-rect.left-36,gameArea.offsetWidth-72));
        });
        gameArea.addEventListener('touchmove',e=>{
            e.preventDefault();
            const rect=gameArea.getBoundingClientRect();
            targetX=Math.max(0,Math.min(e.touches[0].clientX-rect.left-36,gameArea.offsetWidth-72));
        },{passive:false});
    </script>
</body>
</html>
