<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vinda, Amina! 🐱</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #1a0a2e;
            overflow: hidden; position: relative;
        }
        .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .star { position:absolute; border-radius:50%; background:white; animation:twinkle var(--dur) ease-in-out infinite; }
        @keyframes twinkle { 0%,100%{opacity:0.2;transform:scale(1);} 50%{opacity:1;transform:scale(1.3);} }
        .hearts-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .heart-particle { position:absolute; font-size:1.2rem; opacity:0; animation:floatUp var(--dur2) ease-in-out infinite; animation-delay:var(--delay); }
        @keyframes floatUp {
            0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
            10%{opacity:0.8;} 90%{opacity:0.4;}
            100%{transform:translateY(-20vh) rotate(360deg);opacity:0;}
        }
        .container {
            position:relative; z-index:2; text-align:center;
            padding:3rem 2.5rem;
            background:rgba(255,255,255,0.06); backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.15); border-radius:32px;
            max-width:520px; width:90%;
            box-shadow:0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .cat-avatar {
            font-size:5rem; margin-bottom:0.5rem; display:block;
            animation:catBounce 2s ease-in-out infinite;
            filter:drop-shadow(0 0 20px rgba(255,100,180,0.8));
        }
        @keyframes catBounce { 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-12px) rotate(3deg);} }
        h1 {
            font-size:2.6rem; font-weight:800;
            background:linear-gradient(135deg,#ff9de2,#ffb347,#ff6b9d);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            margin-bottom:0.6rem; opacity:0; animation:slideDown 0.8s forwards 0.3s;
        }
        .welcome-text { color:rgba(255,255,255,0.7); font-size:1.05rem; margin-bottom:2.5rem; opacity:0; animation:fadeIn 0.8s forwards 0.7s; line-height:1.6; }
        .buttons { display:flex; flex-direction:column; gap:0.9rem; opacity:0; animation:fadeIn 0.8s forwards 1.1s; }
        .nav-button {
            padding:1rem 1.8rem; font-family:'Nunito',sans-serif;
            font-size:1.05rem; font-weight:700; border:none; border-radius:16px;
            cursor:pointer; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            position:relative; overflow:hidden; letter-spacing:0.3px;
        }
        .nav-button::before { content:''; position:absolute; inset:0; background:rgba(255,255,255,0.15); opacity:0; transition:opacity 0.3s; }
        .nav-button:hover::before { opacity:1; }
        .nav-button:hover { transform:translateY(-3px) scale(1.02); }
        .nav-button:active { transform:scale(0.98); }
        .btn-games { background:linear-gradient(135deg,#ff6b9d,#c44dff); color:white; box-shadow:0 8px 25px rgba(196,77,255,0.4); }
        .btn-quiz { background:linear-gradient(135deg,#ffb347,#ff6b6b); color:white; box-shadow:0 8px 25px rgba(255,107,107,0.4); }
        .btn-gallery { background:linear-gradient(135deg,#4ecdc4,#44a3f7); color:white; box-shadow:0 8px 25px rgba(68,163,247,0.4); }
        .music-control {
            position:fixed; bottom:24px; right:24px;
            background:rgba(255,255,255,0.1); backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.2); border-radius:50%;
            width:52px; height:52px; cursor:pointer; display:flex; align-items:center; justify-content:center;
            font-size:1.4rem; z-index:10; transition:all 0.3s;
        }
        .music-control:hover { transform:scale(1.1); background:rgba(255,255,255,0.2); }
        .music-control.playing { animation:pulse 1.5s ease-in-out infinite; border-color:#ff6b9d; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,157,0.4);} 50%{box-shadow:0 0 0 12px rgba(255,107,157,0);} }
        @keyframes slideDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        @media(max-width:480px){.container{padding:2rem 1.5rem;}h1{font-size:2rem;}.cat-avatar{font-size:4rem;}}
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="hearts-container" id="hearts"></div>
    <div class="container">
        <span class="cat-avatar">😻</span>
        <h1>Bem-vinda, Amina!</h1>
        <p class="welcome-text">Eu te amo muito minha Rapunzel.❤️😘 </p>
        <div class="buttons">
            <button class="nav-button btn-games" onclick="window.location.href='pagina2.html'">🎮 Divertir-se</button>
            <button class="nav-button btn-quiz" onclick="window.location.href='quiz.html'">🌸 Quiz Amina</button>
            <button class="nav-button btn-gallery" onclick="window.location.href='galeria.html'">🙃 Galeria das Memórias</button>
        </div>
    </div>
    <button class="music-control" id="musicToggle" title="Música">🎵</button>
    <audio id="bgMusic" loop><source src="audio.mp3" type="audio/mp3"></audio>
    <script>
        const starsEl = document.getElementById('stars');
        for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';const size=Math.random()*3+1;s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s`;starsEl.appendChild(s);}
        const heartsEl=document.getElementById('hearts');const heartSymbols=['🌸','⭐','✨','💕','🐱','🌙','💫'];
        for(let i=0;i<18;i++){const h=document.createElement('div');h.className='heart-particle';h.textContent=heartSymbols[Math.floor(Math.random()*heartSymbols.length)];h.style.cssText=`left:${Math.random()*100}%;--dur2:${6+Math.random()*8}s;--delay:${Math.random()*8}s`;heartsEl.appendChild(h);}
        const musicToggle=document.getElementById('musicToggle'),bgMusic=document.getElementById('bgMusic');let playing=false;
        musicToggle.addEventListener('click',()=>{if(playing){bgMusic.pause();musicToggle.textContent='🎵';musicToggle.classList.remove('playing');}else{bgMusic.play().catch(()=>{});musicToggle.textContent='🔇';musicToggle.classList.add('playing');}playing=!playing;});
    </script>
</body>
</html>
