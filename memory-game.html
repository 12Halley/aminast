<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memória Felina 🧠</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Nunito',sans-serif;min-height:100vh;background:#1a0a2e;padding:1rem 1rem 2rem;display:flex;flex-direction:column;align-items:center;}
        .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
        .star{position:absolute;border-radius:50%;background:white;animation:twinkle var(--dur) ease-in-out infinite;}
        @keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.8;}}
        .back-btn{position:fixed;top:1.2rem;left:1.2rem;z-index:100;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);color:white;font-family:'Nunito',sans-serif;font-weight:700;padding:0.6rem 1.2rem;border-radius:50px;cursor:pointer;transition:all 0.3s;font-size:0.95rem;}
        .back-btn:hover{background:rgba(255,255,255,0.2);transform:translateX(-3px);}
        .wrapper{position:relative;z-index:2;width:100%;max-width:520px;padding-top:1rem;display:flex;flex-direction:column;align-items:center;gap:0.8rem;}
        h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#c084fc,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .hud{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;font-size:1rem;color:rgba(255,255,255,0.85);font-weight:700;}
        .hud span{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:0.35rem 0.9rem;border-radius:50px;}
        .hud .label{color:rgba(255,255,255,0.5);font-size:0.8rem;}
        .level-indicator{color:rgba(255,255,255,0.6);font-size:0.9rem;}
        .grid{display:grid;gap:8px;width:100%;}
        .card{aspect-ratio:1;cursor:pointer;perspective:600px;}
        .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);}
        .card.flipped .card-inner{transform:rotateY(180deg);}
        .card.matched .card-inner{transform:rotateY(180deg);}
        .card-front,.card-back{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;font-size:2rem;}
        .card-back{background:linear-gradient(135deg,rgba(139,92,246,0.4),rgba(192,132,252,0.3));border:2px solid rgba(192,132,252,0.4);}
        .card-back::after{content:'🐾';font-size:1.4rem;opacity:0.4;}
        .card-front{background:rgba(255,255,255,0.08);border:2px solid rgba(192,132,252,0.5);transform:rotateY(180deg);}
        .card.matched .card-front{background:rgba(134,239,172,0.15);border-color:rgba(134,239,172,0.5);animation:matchPop 0.4s ease;}
        @keyframes matchPop{0%{transform:rotateY(180deg) scale(1);}50%{transform:rotateY(180deg) scale(1.15);}100%{transform:rotateY(180deg) scale(1);}}
        .btn{padding:0.7rem 1.8rem;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;transition:all 0.3s;background:linear-gradient(135deg,#8b5cf6,#c084fc);color:white;box-shadow:0 4px 15px rgba(139,92,246,0.4);}
        .btn:hover{transform:translateY(-2px) scale(1.05);}
        .win-msg{display:none;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:1.5rem;text-align:center;width:100%;}
        .win-msg h2{color:#c084fc;font-size:1.6rem;margin-bottom:0.5rem;}
        .win-msg p{color:rgba(255,255,255,0.7);margin-bottom:1rem;}
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <button class="back-btn" onclick="window.location.href='pagina2.html'">← Voltar</button>
    <div class="wrapper">
        <h1>🧠 Memória Felina</h1>
        <div class="hud">
            <span><span class="label">Nível </span><span id="lvl">1</span></span>
            <span><span class="label">Pares </span><span id="pairs">0</span></span>
            <span><span class="label">Tentativas </span><span id="tries">0</span></span>
        </div>
        <p class="level-indicator" id="levelHint">Encontra 2 pares para avançar!</p>
        <div class="grid" id="grid"></div>
        <div class="win-msg" id="winMsg">
            <h2>🎉 Parabéns!</h2>
            <p id="winText"></p>
            <button class="btn" id="nextBtn">Próximo Nível ▶</button>
        </div>
        <button class="btn" onclick="initGame(1)" style="margin-top:0.5rem">↺ Recomeçar</button>
    </div>
    <script>
        const starsEl=document.getElementById('stars');
        for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+1;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s`;starsEl.appendChild(s);}

        const ALL=['😺','🐱','😸','😹','😻','😼','😽','😾','🐈','🐈‍⬛','🦁','🐯','🐆','🐅','🐻','🦊'];
        const LEVELS=[
            {pairs:2,cols:2},{pairs:4,cols:4},{pairs:6,cols:4},{pairs:8,cols:4},{pairs:10,cols:5},{pairs:12,cols:6}
        ];
        let level=1,flipped=[],locked=false,pairsFound=0,tries=0;

        function initGame(lvl){
            level=lvl;
            const cfg=LEVELS[Math.min(lvl-1,LEVELS.length-1)];
            pairsFound=0;tries=0;flipped=[];locked=false;
            document.getElementById('lvl').textContent=lvl;
            document.getElementById('pairs').textContent=0;
            document.getElementById('tries').textContent=0;
            document.getElementById('levelHint').textContent=`Encontra ${cfg.pairs} pares!`;
            document.getElementById('winMsg').style.display='none';
            const grid=document.getElementById('grid');
            grid.style.gridTemplateColumns=`repeat(${cfg.cols},1fr)`;
            grid.innerHTML='';
            const emojis=[...ALL.slice(0,cfg.pairs),...ALL.slice(0,cfg.pairs)].sort(()=>Math.random()-0.5);
            emojis.forEach(em=>{
                const card=document.createElement('div');
                card.className='card';
                card.dataset.em=em;
                card.innerHTML=`<div class="card-inner"><div class="card-back"></div><div class="card-front">${em}</div></div>`;
                card.addEventListener('click',()=>flipCard(card));
                grid.appendChild(card);
            });
        }

        function flipCard(card){
            if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
            card.classList.add('flipped');
            flipped.push(card);
            if(flipped.length===2){
                locked=true;tries++;
                document.getElementById('tries').textContent=tries;
                if(flipped[0].dataset.em===flipped[1].dataset.em){
                    flipped.forEach(c=>c.classList.add('matched'));
                    pairsFound++;document.getElementById('pairs').textContent=pairsFound;
                    flipped=[];locked=false;
                    const cfg=LEVELS[Math.min(level-1,LEVELS.length-1)];
                    if(pairsFound===cfg.pairs)setTimeout(showWin,400);
                } else {
                    setTimeout(()=>{flipped.forEach(c=>c.classList.remove('flipped'));flipped=[];locked=false;},900);
                }
            }
        }

        function showWin(){
            const cfg=LEVELS[Math.min(level-1,LEVELS.length-1)];
            const nextLvl=level+1;
            document.getElementById('winText').textContent=`Nível ${level} completo! ${tries} tentativas para ${cfg.pairs} pares.`;
            const nb=document.getElementById('nextBtn');
            if(nextLvl<=LEVELS.length){nb.textContent='Próximo Nível ▶';nb.onclick=()=>initGame(nextLvl);}
            else{nb.textContent='↺ Jogar Novamente';nb.onclick=()=>initGame(1);}
            document.getElementById('winMsg').style.display='block';
        }

        initGame(1);
    </script>
</body>
</html>
